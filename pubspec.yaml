name: cldr
description: "A compact, elegant calendar application with Material 3 design."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  get_it: ^7.6.7
  dio: ^5.4.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  table_calendar: ^3.1.2
  uuid: ^4.3.3
  dartz: ^0.10.1
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
